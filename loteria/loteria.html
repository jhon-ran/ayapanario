<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotería Ayapaneca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F3E9D2;
    --paper:#FBF6EA;
    --ink:#2A231C;
    --teal:#2E9C93;
    --mustard:#E0A72E;
    --pink:#E88BA0;
    --navy:#1C2A4A;
    --terracotta:#C0562F;
    --line: rgba(42,35,28,0.18);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(42,35,28,0.06) 1px, transparent 0);
    background-size: 22px 22px;
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 16px 60px;
  }
  header{
    text-align:center;
    margin-bottom:22px;
    max-width:640px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:clamp(28px,5vw,42px);
    margin:0 0 4px;
    letter-spacing:-0.01em;
  }
  header p{
    font-family:'Fraunces', serif;
    font-style:italic;
    color:var(--terracotta);
    margin:0;
    font-size:15px;
  }

  .layout{
    width:100%;
    max-width:1080px;
    display:grid;
    grid-template-columns: minmax(0,1fr) 320px;
    gap:28px;
    align-items:start;
  }
  @media (max-width: 860px){
    .layout{ grid-template-columns: 1fr; }
  }

  /* ---------- CARD ---------- */
  .stage{
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .card-wrap{
    perspective:1400px;
    width:min(360px, 80vw);
    aspect-ratio: 5 / 7;
  }
  .card{
    position:relative;
    width:100%;
    height:100%;
    border-radius:14px;
    transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.5,.05,.15,1);
  }
  .card.flip{ transform:rotateY(360deg); }
  .card-face{
    position:absolute; inset:0;
    background:var(--paper);
    border:3px solid var(--ink);
    border-radius:14px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow: 0 10px 30px rgba(42,35,28,0.18);
  }
  .badge{
    position:absolute;
    top:10px; left:10px;
    background:var(--ink);
    color:var(--paper);
    font-family:'IBM Plex Mono', monospace;
    font-weight:500;
    font-size:15px;
    width:32px;height:32px;
    border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    z-index:3;
  }
  .panel{
    position:relative;
    overflow:hidden;
    flex:1 1 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:18px;
    transition:background .3s ease;
  }
  .panel .empty-mark{
    font-family:'Fraunces', serif;
    font-size:15px;
    color:rgba(42,35,28,0.4);
    font-style:italic;
  }
  .word-band{
    flex:0 0 auto;
    background:var(--cream);
    border-top:2px solid var(--ink);
    padding:12px 10px 16px;
    text-align:center;
  }
  .aya-word{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:clamp(20px,4.5vw,26px);
    color:var(--terracotta);
    line-height:1.15;
    min-height:1.3em;
  }
  .rule{
    display:flex; align-items:center; gap:6px;
    justify-content:center;
    margin:6px 0;
    color:rgba(42,35,28,0.45);
    font-size:11px;
  }
  .rule::before, .rule::after{
    content:"";
    flex:1;
    max-width:60px;
    border-top:1px dotted rgba(42,35,28,0.4);
  }
  .es-word{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-style:italic;
    font-size:clamp(16px,3.6vw,20px);
    color:var(--navy);
    min-height:1.3em;
  }
  .hidden-text{
    filter: blur(7px);
    user-select:none;
    opacity:.7;
  }
  .rec-flag{
    font-size:10.5px;
    color:rgba(42,35,28,0.5);
    margin-top:2px;
    font-family:'Inter',sans-serif;
    min-height:1.2em;
  }

  .idle-card .aya-word{ color:rgba(42,35,28,0.35); }
  .idle-card .panel{ background:var(--paper) !important; }

  .card-img{
    position:absolute;
    inset:10px;
    width:calc(100% - 20px);
    height:calc(100% - 20px);
    object-fit:contain;
    display:block;
  }
  .panel.img-missing .card-img{ display:none; }
  .panel.img-missing::after{
    content:"";
  }

  .credit{
    max-width:640px;
    text-align:center;
    font-family:'Inter',sans-serif;
    font-size:11px;
    letter-spacing:.04em;
    text-transform:uppercase;
    color:rgba(42,35,28,0.55);
    border-top:1px solid var(--line);
    padding-top:14px;
    margin-top:22px;
  }

  /* ---------- CONTROLS UNDER CARD ---------- */
  .transport{
    display:flex;
    gap:10px;
    margin-top:22px;
    flex-wrap:wrap;
    justify-content:center;
  }
  button{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    border:2px solid var(--ink);
    background:var(--paper);
    color:var(--ink);
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    transition:transform .12s ease, background .15s ease;
  }
  button:hover{ transform:translateY(-1px); }
  button:active{ transform:translateY(0); }
  button.primary{
    background:var(--ink);
    color:var(--paper);
  }
  button:disabled{
    opacity:.4;
    cursor:not-allowed;
    transform:none;
  }
  .status-line{
    margin-top:14px;
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color:rgba(42,35,28,0.65);
    text-align:center;
    min-height:18px;
  }

  /* ---------- SIDE PANEL ---------- */
  .side{
    background:var(--paper);
    border:2px solid var(--ink);
    border-radius:14px;
    padding:20px;
  }
  .side h2{
    font-family:'Fraunces', serif;
    font-size:16px;
    margin:0 0 12px;
    text-transform:uppercase;
    letter-spacing:.06em;
  }
  .mode-group{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:20px;
  }
  .mode-btn{
    text-align:left;
    border-radius:8px;
    padding:10px 12px;
    background:var(--paper);
  }
  .mode-btn small{
    display:block;
    font-weight:400;
    font-size:11.5px;
    color:rgba(42,35,28,0.6);
    margin-top:2px;
  }
  .mode-btn.active{
    background:var(--teal);
    color:var(--paper);
    border-color:var(--ink);
  }
  .mode-btn.active small{ color:rgba(251,246,234,0.85); }

  .field{
    margin-bottom:18px;
  }
  .field label{
    font-size:12.5px;
    font-weight:600;
    display:flex;
    justify-content:space-between;
    margin-bottom:6px;
  }
  input[type=range]{
    width:100%;
  }
  .toggle-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size:13px;
    padding:8px 0;
    border-top:1px solid var(--line);
  }
  .toggle-row:first-of-type{ border-top:none; }
  .switch{
    position:relative;
    width:38px; height:22px;
    flex:0 0 auto;
  }
  .switch input{ opacity:0; width:0; height:0; }
  .slider-pill{
    position:absolute; inset:0;
    background:rgba(42,35,28,0.25);
    border-radius:20px;
    transition:.2s;
  }
  .slider-pill::before{
    content:"";
    position:absolute;
    height:16px;width:16px;
    left:3px; top:3px;
    background:var(--paper);
    border-radius:50%;
    transition:.2s;
  }
  input:checked + .slider-pill{ background:var(--teal); }
  input:checked + .slider-pill::before{ transform:translateX(16px); }

  /* ---------- TABLA / GRID TRACKER ---------- */
  .tracker{
    margin-top:26px;
    width:100%;
    max-width:1080px;
  }
  .tracker h2{
    font-family:'Fraunces', serif;
    font-size:15px;
    text-transform:uppercase;
    letter-spacing:.06em;
    margin:0 0 10px;
    color:rgba(42,35,28,0.7);
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:7px;
  }
  @media (max-width:600px){
    .grid{ grid-template-columns:repeat(8,1fr); }
  }
  .chip{
    aspect-ratio:1;
    border:1.5px solid var(--line);
    border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:rgba(42,35,28,0.55);
    background:var(--paper);
    transition:all .2s ease;
  }
  .chip.called{
    background:var(--mustard);
    border-color:var(--ink);
    color:var(--ink);
    font-weight:600;
  }
  .chip.current{
    background:var(--terracotta);
    border-color:var(--ink);
    color:var(--paper);
    font-weight:700;
    transform:scale(1.08);
  }

  .footer-note{
    max-width:640px;
    text-align:center;
    font-size:12px;
    color:rgba(42,35,28,0.55);
    margin-top:30px;
    line-height:1.5;
  }
  .footer-note code{
    background:rgba(42,35,28,0.08);
    padding:1px 5px;
    border-radius:4px;
  }
</style>
</head>
<body>

<header>
  <h1>mbü'tzko de numde oode</h1>
  <p>Lotería Ayapaneco — Llamador para el aula</p>
</header>

<div class="layout">

  <div class="stage">
    <div class="card-wrap">
      <div class="card" id="card">
        <div class="card-face">
          <div class="badge" id="badge">–</div>
          <div class="panel" id="panel">
            <span class="empty-mark">presiona "Jugar" para comenzar</span>
          </div>
          <div class="word-band">
            <div class="aya-word" id="ayaWord"></div>
            <div class="rec-flag" id="ayaFlag"></div>
            <div class="rule"></div>
            <div class="es-word" id="esWord"></div>
            <div class="rec-flag" id="esFlag"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="transport">
      <button class="primary" id="playBtn">▶ Jugar</button>
      <button id="nextBtn">Siguiente carta</button>
      <button id="repeatBtn">🔁 Repetir</button>
      <button id="revealBtn" style="display:none;">Mostrar español</button>
      <button id="resetBtn">Barajar de nuevo</button>
    </div>
    <div class="status-line" id="status">0 de 40 cartas llamadas</div>
  </div>

  <div class="side">
    <h2>Nivel</h2>
    <div class="mode-group" id="modeGroup">
      <button class="mode-btn active" data-mode="beginner">
        Principiante
        <small>Ayapaneco, luego español lento. Ambos textos visibles</small>
      </button>
      <button class="mode-btn" data-mode="intermediate">
        Intermedio
        <small>Ayapaneco, luego español a ritmo normal</small>
      </button>
      <button class="mode-btn" data-mode="expert">
        Experto
        <small>Solo ayapaneco, español oculto y ritmo rápido</small>
      </button>
    </div>

    <div class="field">
      <label><span>Velocidad</span><span id="speedVal">1.0×</span></label>
      <input type="range" id="speed" min="0.6" max="1.6" step="0.1" value="1.0">
    </div>

    <div class="toggle-row">
      <span>Avanzar automáticamente</span>
      <label class="switch">
        <input type="checkbox" id="autoAdvance" checked>
        <span class="slider-pill"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span>Repetir sin repetir cartas</span>
      <label class="switch">
        <input type="checkbox" id="noRepeat" checked disabled>
        <span class="slider-pill"></span>
      </label>
    </div>
  </div>

</div>

<div class="tracker">
  <h2>Tablero de números llamados</h2>
  <div class="grid" id="grid"></div>
</div>

<p class="credit">©Grupo Colectivo Independiente el Retoño de Mis Raíces 2026 - Uso exclusivo</p>

<script>
/* ============================================================
   LISTA DE PALABRAS
   ============================================================ */
const WORDS = [
  {n:1,aya:"aaba",es:"madre"},{n:2,aya:"jaadu",es:"padre"},
  {n:3,aya:"mbaanük",es:"niño"},{n:4,aya:"miistu",es:"gato"},
  {n:5,aya:"taa'ga",es:"perro"},{n:6,aya:"a'ksi",es:"zanate"},
  {n:7,aya:"akxaj",es:"pejelagarto"},{n:8,aya:"kawaayo",es:"caballo"},
  {n:9,aya:"kützyoo'mo",es:"niña"},{n:10,aya:"gwaagax",es:"vaca"},
  {n:11,aya:"tük",es:"casa"},{n:12,aya:"ndakxku",es:"machete"},
  {n:13,aya:"wo'nh",es:"pez"},{n:14,aya:"tajpi",es:"gavilán"},
  {n:15,aya:"aane",es:"tortilla"},{n:16,aya:"xük",es:"frijol"},
  {n:17,aya:"po'ogwi",es:"huevo"},{n:18,aya:"tzooge",es:"fuego"},
  {n:19,aya:"pooya",es:"luna"},{n:20,aya:"mbooya",es:"flor"},
  {n:21,aya:"yokuy",es:"tronco de árbol"},{n:22,aya:"tuj",es:"lluvia"},
  {n:23,aya:"gwanhgo",es:"banca"},{n:24,aya:"meexa",es:"mesa"},
  {n:25,aya:"tügünaaga",es:"puerta"},{n:26,aya:"too'do",es:"libro"},
  {n:27,aya:"poome",es:"pelota"},{n:28,aya:"piidzi",es:"tamal"},
  {n:29,aya:"tzeegwa",es:"pozol"},{n:30,aya:"aa'",es:"cayuco"},
  {n:31,aya:"mbok",es:"máiz"},{n:32,aya:"mbaa'dza",es:"estrella"},
  {n:33,aya:"tujtzi",es:"colibrí"},{n:34,aya:"pabaalo",es:"mariposa"},
  {n:35,aya:"xap",es:"plátano"},{n:36,aya:"gwoogo",es:"cántaro"},
  {n:37,aya:"xumneej",es:"sombrero"},{n:38,aya:"kü'ük",es:"huarache"},
  {n:39,aya:"ayme",es:"corazón"},{n:40,aya:"paa'do",es:"pato"}
];

/* ============================================================
   AUDIO — AYAPANECO Y ESPAÑOL
   ------------------------------------------------------------
   Igual que las imágenes: no hay que escribir una lista a mano.
   La app busca automáticamente audio/aya/01.mp4, audio/aya/02.mp4...
   y audio/es/01.mp4, audio/es/02.mp4... junto a este archivo HTML.

   Si tus archivos usan otra extensión (.mp3, .m4a, .wav), cambia
   "ext" abajo. Si un archivo no existe o el navegador no puede
   reproducirlo, la app simplemente sigue con el respaldo normal
   (pausa silenciosa para ayapaneco, voz sintetizada para español)
   y deja un aviso en la consola del navegador (F12) explicando qué
   archivo falló.
   ============================================================ */
const AUDIO_CONFIG = {
  aya: { folder: "audio/aya/", ext: "mp4" },
  es:  { folder: "audio/es/",  ext: "mp4" },
};
function audioPath(lang, n){
  const c = AUDIO_CONFIG[lang];
  return c.folder + String(n).padStart(2,'0') + "." + c.ext;
}

/* ============================================================
   IMÁGENES DE CADA CARTA (01.png ... 40.png)
   ------------------------------------------------------------
   Coloca tus 40 imágenes en una carpeta llamada "imagenes" justo
   al lado de este archivo HTML. Si una imagen no existe todavía,
   la carta simplemente muestra su color de fondo, sin errores.
   ============================================================ */
const IMAGE_FOLDER = "imagenes/";
function imagePath(n){
  return IMAGE_FOLDER + String(n).padStart(2,'0') + ".png";
}

/* ============================================================
   CONFIGURACIÓN DE NIVELES
   ============================================================ */
/* Cada nivel siempre dice primero el ayapaneco. La diferencia está
   en si después se dice el español, a qué velocidad, y si el texto
   en español se muestra o se oculta. */
const MODES = {
  beginner:    { rate:0.68, showEs:true,  speakEs:true,  pause:1100 },
  intermediate:{ rate:0.92, showEs:true,  speakEs:true,  pause:800  },
  expert:      { rate:1.15, showEs:false, speakEs:false, pause:500  },
};
const NO_AUDIO_PAUSE = 1300;   // ms de espera cuando falta la grabación en ayapaneco
const GAP_BETWEEN_WORDS = 350; // ms de silencio entre ayapaneco y español

/* ============================================================
   ESTADO
   ============================================================ */
let currentMode = "beginner";
let speedFactor = 1.0;
let deck = [];
let called = [];
let currentWord = null;
let playing = false;
let esVoice = null;

/* ============================================================
   VOCES DEL NAVEGADOR
   ============================================================ */
function pickVoice(){
  const voices = speechSynthesis.getVoices();
  esVoice = voices.find(v => v.lang === 'es-MX')
        || voices.find(v => v.lang && v.lang.startsWith('es'))
        || null;
}
if ('speechSynthesis' in window){
  speechSynthesis.onvoiceschanged = pickVoice;
  pickVoice();
}

function speakSpanish(text, rate, onEnd){
  if (!('speechSynthesis' in window)){ onEnd && onEnd(); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-MX';
  if (esVoice) u.voice = esVoice;
  u.rate = rate;
  u.onend = () => onEnd && onEnd();
  u.onerror = () => onEnd && onEnd();
  speechSynthesis.speak(u);
}

function playRecording(url, onEnd, onError){
  const a = new Audio(url);
  let settled = false;
  const finish = () => { if (!settled){ settled = true; onEnd && onEnd(); } };
  const fail = (e) => {
    if (settled) return;
    settled = true;
    console.warn('[audio] no se pudo reproducir "' + url + '":', (e && e.message) || e || 'archivo no encontrado o formato no soportado');
    onError && onError();
  };
  a.addEventListener('ended', finish);
  a.addEventListener('error', () => fail(a.error));
  a.play().catch(fail);
}

/* Ayapaneco: intenta la grabación numerada; si falla o no existe,
   pausa silenciosa para que el maestro lo diga en voz alta. */
function sayAyapaneco(n, onEnd){
  playRecording(
    audioPath('aya', n),
    onEnd,
    () => {
      ayaFlag.textContent = '🎙️ sin grabación — pronúncialo en voz alta';
      setTimeout(onEnd, NO_AUDIO_PAUSE / speedFactor);
    }
  );
}

/* Español: intenta la grabación numerada; si falla o no existe,
   usa temporalmente la voz sintetizada del navegador. */
function sayEspanol(word, rate, onEnd){
  playRecording(
    audioPath('es', word.n),
    onEnd,
    () => {
      esFlag.textContent = '🔈 voz sintetizada (temporal)';
      speakSpanish(word.es, rate, onEnd);
    }
  );
}

/* ============================================================
   ELEMENTOS DEL DOM
   ============================================================ */
const cardEl   = document.getElementById('card');
const panelEl  = document.getElementById('panel');
const badgeEl  = document.getElementById('badge');
const ayaEl    = document.getElementById('ayaWord');
const esEl     = document.getElementById('esWord');
const ayaFlag  = document.getElementById('ayaFlag');
const esFlag   = document.getElementById('esFlag');
const statusEl = document.getElementById('status');
const gridEl   = document.getElementById('grid');
const playBtn  = document.getElementById('playBtn');
const nextBtn  = document.getElementById('nextBtn');
const repeatBtn= document.getElementById('repeatBtn');
const revealBtn= document.getElementById('revealBtn');
const resetBtn = document.getElementById('resetBtn');
const speedInp = document.getElementById('speed');
const speedVal = document.getElementById('speedVal');
const autoAdv  = document.getElementById('autoAdvance');

const PANEL_COLORS = ['var(--teal)','var(--mustard)','var(--pink)','var(--navy)','var(--paper)'];

/* ============================================================
   TABLERO DE SEGUIMIENTO (1-40)
   ============================================================ */
function buildGrid(){
  gridEl.innerHTML = '';
  for (let i=1;i<=40;i++){
    const c = document.createElement('div');
    c.className = 'chip';
    c.textContent = i;
    c.id = 'chip-' + i;
    gridEl.appendChild(c);
  }
}
buildGrid();

function refreshGrid(){
  for (let i=1;i<=40;i++){
    const c = document.getElementById('chip-'+i);
    c.classList.toggle('called', called.includes(i));
    c.classList.toggle('current', currentWord && currentWord.n === i);
  }
}

/* ============================================================
   BARAJAR / REINICIAR
   ============================================================ */
function shuffleDeck(){
  deck = [...WORDS];
  for (let i = deck.length -1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]] = [deck[j],deck[i]];
  }
}
function resetAll(){
  speechSynthesis && speechSynthesis.cancel();
  playing = false;
  called = [];
  currentWord = null;
  shuffleDeck();
  playBtn.textContent = '▶ Jugar';
  panelEl.innerHTML = '<span class="empty-mark">presiona "Jugar" para comenzar</span>';
  panelEl.style.background = 'var(--paper)';
  badgeEl.textContent = '–';
  ayaEl.textContent = '';
  esEl.textContent = '';
  esEl.classList.remove('hidden-text');
  ayaFlag.textContent = '';
  esFlag.textContent = '';
  panelEl.classList.remove('img-missing');
  revealBtn.style.display = 'none';
  updateStatus();
  refreshGrid();
}

function updateStatus(){
  if (called.length === 40){
    statusEl.textContent = '¡Lotería completa! 40 de 40 cartas llamadas 🎉';
  } else {
    statusEl.textContent = called.length + ' de 40 cartas llamadas';
  }
}

/* ============================================================
   MODOS
   ============================================================ */
document.getElementById('modeGroup').addEventListener('click', (e)=>{
  const btn = e.target.closest('.mode-btn');
  if (!btn) return;
  currentMode = btn.dataset.mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active', b===btn));
});

speedInp.addEventListener('input', ()=>{
  speedFactor = parseFloat(speedInp.value);
  speedVal.textContent = speedFactor.toFixed(1) + '×';
});

/* ============================================================
   LLAMAR UNA CARTA
   ============================================================ */
function callNextCard(){
  if (deck.length === 0){
    playing = false;
    playBtn.textContent = '▶ Jugar';
    updateStatus();
    return;
  }
  const word = deck.pop();
  currentWord = word;
  called.push(word.n);
  refreshGrid();
  renderCard(word);
  runVoiceSequence(word, ()=>{
    updateStatus();
    if (playing && autoAdv.checked){
      const cfg = MODES[currentMode];
      setTimeout(callNextCard, cfg.pause / speedFactor);
    }
  });
}

function renderCard(word){
  const cfg = MODES[currentMode];
  badgeEl.textContent = word.n;
  panelEl.classList.remove('img-missing');
  panelEl.innerHTML = `<img class="card-img" src="${imagePath(word.n)}" alt="${word.es}"
    onerror="this.parentElement.classList.add('img-missing'); this.remove();">`;
  panelEl.style.background = PANEL_COLORS[word.n % PANEL_COLORS.length];

  ayaEl.textContent = word.aya;
  esEl.textContent = word.es;

  const hideEs = !cfg.showEs;
  esEl.classList.toggle('hidden-text', hideEs);
  revealBtn.style.display = hideEs ? 'inline-block' : 'none';

  ayaFlag.textContent = '';
  esFlag.textContent = '';

  cardEl.classList.remove('flip');
  void cardEl.offsetWidth; // reinicia la animación
  cardEl.classList.add('flip');
}

/* Todos los niveles dicen primero el ayapaneco. Principiante e
   intermedio siguen con el español (grabación propia si existe,
   si no la voz del navegador); experto se detiene ahí. */
function runVoiceSequence(word, done){
  const cfg = MODES[currentMode];
  const rate = Math.min(2, Math.max(0.4, cfg.rate * speedFactor));

  sayAyapaneco(word.n, () => {
    if (!cfg.speakEs){ done(); return; }
    setTimeout(() => sayEspanol(word, rate, done), GAP_BETWEEN_WORDS / speedFactor);
  });
}

revealBtn.addEventListener('click', ()=>{
  esEl.classList.remove('hidden-text');
  revealBtn.style.display = 'none';
});

repeatBtn.addEventListener('click', ()=>{
  if (!currentWord) return;
  runVoiceSequence(currentWord, ()=>{});
});

nextBtn.addEventListener('click', ()=>{
  callNextCard();
});

playBtn.addEventListener('click', ()=>{
  if (playing){
    playing = false;
    playBtn.textContent = '▶ Jugar';
    speechSynthesis && speechSynthesis.cancel();
  } else {
    if (called.length === 40){ resetAll(); }
    playing = true;
    playBtn.textContent = '⏸ Pausar';
    callNextCard();
  }
});

resetBtn.addEventListener('click', resetAll);

resetAll();
</script>
</body>
</html>
